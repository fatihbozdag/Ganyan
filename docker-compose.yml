services:
  db:
    image: postgres:16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ganyan}
      POSTGRES_USER: ${POSTGRES_USER:-ganyan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ganyan}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
